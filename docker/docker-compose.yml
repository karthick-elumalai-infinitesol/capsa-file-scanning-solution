networks:
  capsa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  clamav-db:
  redis-data:

services:
  # ===========================================================================
  # ClamAV Antivirus Engine — stream-based malware detection
  # Uses official Alpine/slim image with freshclam for auto signature updates
  # ===========================================================================
  clamav:
    image: clamav/clamav:1.5.2-debian13-slim
    container_name: capsa-clamav
    restart: unless-stopped
    networks:
      - capsa-network
    ports:
      - "3310:3310"
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/lock
      - /var/log/clamav
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # CAPSA Scanner — FastAPI-based malware scanner
  # Streams file bytes to ClamAV, correlates with VirusTotal/GuardDuty/Inspector
  # ===========================================================================
  scanner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: capsa-scanner:enterprise
    container_name: capsa-scanner
    restart: unless-stopped
    networks:
      - capsa-network
    depends_on:
      clamav:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CLAMAV_TIMEOUT: 30
      LOG_LEVEL: INFO
      MAX_WORKERS: 20
    ports:
      - "8000:8000"
    volumes:
      # Mount test_dataset for local testing (read-only)
      - ../test_dataset:/app/test_dataset:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /app/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 1G

  # ===========================================================================
  # Redis — In-memory queue backend for local development
  # Used by the queue system when QUEUE_BACKEND=redis (default)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: capsa-redis
    restart: unless-stopped
    networks:
      - capsa-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===========================================================================
  # Queue Worker — Background worker that pulls from Redis/SQS and scans
  # Scales independently from the API for large dataset processing
  # ===========================================================================
  queue-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: capsa-scanner:enterprise
    container_name: capsa-queue-worker
    restart: unless-stopped
    networks:
      - capsa-network
    depends_on:
      clamav:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      LOG_LEVEL: INFO
      MAX_WORKERS: 10
    command: ["python", "scripts/queue_worker.py", "--batch-size", "50", "--poll-interval", "5"]
    healthcheck:
      disable: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /app/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 1G

